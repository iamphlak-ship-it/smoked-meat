<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Каталог копченого м'яса</title>
  <meta name="description" content="Простий каталог копченого м'яса">
  <style>
    body { font-family: Arial, sans-serif; margin: 2em; background: #fdfdfd; }
    h1 { color: #8B0000; }
    ul { list-style: none; padding: 0; }
    li { margin: 0.5em 0; padding: 0.5em; border-bottom: 1px solid #ccc; }
    .price { font-weight: bold; color: #006400; }
  </style>
</head>
<body>
  <h1>Каталог копченого м'яса</h1>
  <ul>
    <li>Грудинка копчена — <span class="price">250 грн/кг</span></li>
    <li>Ребра копчені — <span class="price">220 грн/кг</span></li>
    <li>Шийка копчена — <span class="price">270 грн/кг</span></li>
  </ul>
</body>
</html>
