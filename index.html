<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Копченое мясо от Ромы</title>
  <meta name="description" content="Вітрина копченого м'яса з фото та цінами">
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; }
    header { background: #8B0000; color: #fff; padding: 1em; text-align: center; }
    h1 { margin: 0; }
    .catalog { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
    .item { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
    .item:hover { transform: scale(1.03); }
    .item img { width: 100%; height: 180px; object-fit: cover; }
    .info { padding: 15px; text-align: center; }
    .info h2 { margin: 0; font-size: 1.2em; color: #333; }
    .price { font-size: 1.1em; font-weight: bold; color: #006400; margin: 10px 0; }
    .btn { display: inline-block; padding: 10px 15px; background: #8B0000; color: #fff; text-decoration: none; border-radius: 5px; }
    .btn:hover { background: #A52A2A; }
    footer { text-align: center; padding: 1em; background: #333; color: #fff; margin-top: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>Копченое мясо от Ромы</h1>
  </header>

  <div class="catalog">
    <div class="item">
      <img src="img/grudinka.jpg" alt="Грудинка копчена">
      <div class="info">
        <h2>Грудинка копчена</h2>
        <div class="price">250 грн/кг</div>
        <a href="#" class="btn">Замовити</a>
      </div>
    </div>
    <div class="item">
      <img src="img/rebra.jpg" alt="Ребра копчені">
      <div class="info">
        <h2>Ребра копчені</h2>
        <div class="price">220 грн/кг</div>
        <a href="#" class="btn">Замовити</a>
      </div>
    </div>
    <div class="item">
      <img src="img/sheika.jpg" alt="Шийка копчена">
      <div class="info">
        <h2>Шийка копчена</h2>
        <div class="price">270 грн/кг</div>
        <a href="#" class="btn">Замовити</a>
      </div>
    </div>
  </div>

  <footer>
    © 2026 Копченое мясо от Ромы. Всі права захищені.
  </footer>
</body>
</html>
